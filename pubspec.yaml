name: productivity_tracking_analytics
description: A Flutter application for tracking and managing time entries across projects and tasks.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.9.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.0.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.0

  # Charts
  fl_chart: ^0.69.0

  # Notifications
  flutter_local_notifications: ^18.0.0
  timezone: ^0.9.4

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  generate: true
